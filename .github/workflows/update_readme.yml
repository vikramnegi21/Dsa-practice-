name: DSA Forge Pro Sync

on:
  push:
    paths:
      - "problems.csv" # Jaise hi CSV update hogi, heatmap aur targets change ho jayenge
  workflow_dispatch:  # Manual button se bhi chala sakte ho
  schedule:
    - cron: "30 18 * * *" # Roj raat ko automatic update hoga

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Script
        run: python generate_readme.py

      - name: Push Updated Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Teeno cheezein add karni zaroori hain heatmap aur targets ke liye
          git add README.md heatmap.svg targets.svg
          git diff --cached --quiet || (git commit -m "chore: update animated dsa stats" && git push)
          
