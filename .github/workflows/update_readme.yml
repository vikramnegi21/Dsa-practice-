name: Update DSA Dashboard

on:
  push:
    paths:
      - "problems.csv"
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate README + heatmap
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate_readme.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md heatmap.svg
          git diff --cached --quiet || git commit -m "chore: auto-update dashboard $(date +'%d %b %Y')"
          git push
