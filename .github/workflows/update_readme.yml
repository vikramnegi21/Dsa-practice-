name: Update DSA README

on:
  push:
    paths:
      - 'problems.csv'
  schedule:
    - cron: '0 18 * * *'   # Daily 11:30 PM IST (18:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generator
        run: python generate_readme.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md heatmap.svg
          git diff --staged --quiet || git commit -m "🔄 Auto-update DSA progress [$(date +'%d %b %Y, %H:%M UTC')]"
          git push
