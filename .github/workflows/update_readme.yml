name: DSA Dashboard Sync

on:
  push:
    paths:
      - "problems.csv"
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Generator
        run: python generate_data.py
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "update: dash stats" && git push)
          
