name: DSA Forge Auto-Update

on:
  push:
    paths:
      - 'problems.csv'
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *'   # 12:00 AM IST daily

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run dashboard generator
        run: python generate_readme.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md heatmap.svg targets.svg
          git diff --cached --quiet || git commit -m "auto: sync dashboard [skip ci]"
          git push
