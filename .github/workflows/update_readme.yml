name: DSA Forge Pro Sync

on:
  push:
    paths:
      - "problems.csv" # Jaise hi CSV update karoge, sync ho jayega
  workflow_dispatch:  # Manual button ke liye
  schedule:
    - cron: "30 18 * * *" # Roj raat ko 12:00 AM IST par apne aap chalega (2-day table fix ke liye)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Script
        run: python generate_readme.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # README aur dono animated SVGs add karna
          git add README.md heatmap.svg targets.svg
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-sync dsa stats"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes found to sync."
          fi
          
