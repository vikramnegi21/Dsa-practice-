name: 📊 Update README

on:
  push:
    paths:
      - "problems.csv"
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"   # Rozana 10:30 AM IST par chalega

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🔧 Install dependencies
        run: pip install requests

      - name: 🔧 Run generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_readme.py

      - name: 📤 Commit & push changes
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sirf wahi files add kar rahe hain jo script generate karti hai
          git add README.md heatmap.svg
          
          # Agar kuch change hua hai toh hi commit karega
          git diff --staged --quiet || (git commit -m "📊 Auto-update README · $(date +'%d %b %Y')" && git push)
          
