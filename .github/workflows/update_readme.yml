name: DSA Forge Pro Sync

on:
  push:
    paths:
      - "problems.csv"
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pura history fetch karega conflicts hatane ke liye

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Script
        run: python generate_readme.py

      - name: Push Updated Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md heatmap.svg targets.svg
          git diff --cached --quiet || (git pull --rebase origin main && git commit -m "chore: update dsa stats" && git push)
          
